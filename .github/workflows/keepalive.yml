name: Keepalive

# GitHub disables scheduled (cron) workflows after 60 days with no *commit*
# activity in the repository. Daily briefing runs and artifact uploads do NOT
# count as activity — only commits do. This workflow pushes one empty commit a
# month, which resets that 60-day timer for every scheduled workflow in the repo
# (briefing.yml and weekly.yml), so they never get auto-disabled.

on:
  schedule:
    - cron: '0 9 1 * *'   # 09:00 UTC on the 1st of every month
  workflow_dispatch:        # allow a manual run from the Actions tab

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Empty commit to reset the inactivity timer
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive — reset scheduled-workflow inactivity timer"
          git push
